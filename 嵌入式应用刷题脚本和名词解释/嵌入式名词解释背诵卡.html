// ===================== 渲染 =====================
let container = document.getElementById('container');
let allItems = [];

function render() {
  container.innerHTML = '';
  allItems = [];
  let total = 0;

  data.forEach(chapter => {
    // 章节标题
    const title = document.createElement('div');
    title.className = 'chapter-title';
    title.textContent = chapter.chapter;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'card-grid';

    chapter.items.forEach((item, idx) => {
      const cardId = `card-${total}-${idx}`;
      allItems.push(cardId);
      total++;

      const card = document.createElement('div');
      card.className = 'card';
      card.id = cardId;

      // 头部
      const header = document.createElement('div');
      header.className = 'card-header';
      header.onclick = () => toggleCard(cardId);

      const termSpan = document.createElement('span');
      termSpan.className = 'term';
      termSpan.innerHTML = `<span class="num">${total}.</span>${item.term}`;

      const btn = document.createElement('button');
      btn.className = 'btn-toggle';
      btn.textContent = '👀 显示答案';
      btn.onclick = (e) => { e.stopPropagation(); toggleCard(cardId); };

      header.appendChild(termSpan);
      header.appendChild(btn);
      card.appendChild(header);

      // 答案
      const answer = document.createElement('div');
      answer.className = 'card-answer';
      answer.innerHTML = `<div class="definition">${item.def}</div>`;
      card.appendChild(answer);

      grid.appendChild(card);
    });

    container.appendChild(grid);
  });

  document.getElementById('totalCount').textContent = total;
  document.getElementById('totalCount2').textContent = total;
  updateStats();
}

// ===================== 交互 =====================
let isShuffled = false;

function toggleCard(id) {
  const card = document.getElementById(id);
  if (!card) return;
  const answer = card.querySelector('.card-answer');
  const btn = card.querySelector('.btn-toggle');
  const isOpen = answer.classList.toggle('open');
  btn.textContent = isOpen ? '🙈 隐藏答案' : '👀 显示答案';
  btn.classList.toggle('showing', isOpen);
  updateStats();
}

function showAll() {
  // 只展开可见卡片，不展开被搜索隐藏的卡片
  const visibleCards = document.querySelectorAll('.card:not([style*=\"display: none\"])');
  visibleCards.forEach(card => {
    const answer = card.querySelector('.card-answer');
    const btn = card.querySelector('.btn-toggle');
    if (answer && !answer.classList.contains('open')) {
      answer.classList.add('open');
      if (btn) { btn.textContent = '🙈 隐藏答案'; btn.classList.add('showing'); }
    }
  });
  updateStats();
}

function hideAll() {
  // 折叠所有卡片（包括被搜索隐藏的），清除搜索后不会突然展开
  document.querySelectorAll('.card .card-answer').forEach(a => a.classList.remove('open'));
  document.querySelectorAll('.btn-toggle').forEach(b => {
    b.textContent = '👀 显示答案';
    b.classList.remove('showing');
  });
  updateStats();
}

function updateStats() {
  // 只统计可见卡片的展开数
  let open = 0;
  document.querySelectorAll('.card:not([style*=\"display: none\"])').forEach(card => {
    if (card.querySelector('.card-answer.open')) open++;
  });
  document.getElementById('shownCount').textContent = open;
}

function shuffleCards() {
  isShuffled = !isShuffled;

  if (isShuffled) {
    // ----- 进入打乱模式 -----
    const cards = Array.from(document.querySelectorAll('.card'));

    // Fisher-Yates 洗牌
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }

    // 隐藏章节标题
    document.querySelectorAll('.chapter-title').forEach(el => el.style.display = 'none');

    // 隐藏原有 grid
    document.querySelectorAll('.card-grid').forEach(el => el.style.display = 'none');

    // 创建或复用打乱容器
    const shuffleBox = document.getElementById('shuffle-container');
    if (shuffleBox) {
      shuffleBox.style.display = '';
      shuffleBox.innerHTML = '';
    } else {
      const newBox = document.createElement('div');
      newBox.id = 'shuffle-container';
      newBox.className = 'card-grid';
      container.appendChild(newBox);
    }

    const shuffleContainer = document.getElementById('shuffle-container');
    cards.forEach((card, i) => {
      // 重新编号
      const numSpan = card.querySelector('.num');
      if (numSpan) numSpan.textContent = `${i + 1}.`;
      shuffleContainer.appendChild(card);
    });
  } else {
    // ----- 退出打乱模式，恢复章节视图 -----
    document.querySelectorAll('.chapter-title').forEach(el => el.style.display = '');
    document.querySelectorAll('.card-grid').forEach(el => el.style.display = '');
    const shuffleBox = document.getElementById('shuffle-container');
    if (shuffleBox) shuffleBox.style.display = 'none';
    // 重置打乱状态后刷新
    isShuffled = false;
    render();
  }
}

function filterCards() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const term = card.querySelector('.term')?.textContent.toLowerCase() || '';
    const def = card.querySelector('.definition')?.textContent.toLowerCase() || '';
    const match = !q || term.includes(q) || def.includes(q);
    card.style.display = match ? '' : 'none';
  });
  updateStats();
}

// ===================== 启动 =====================
render();
</script>
